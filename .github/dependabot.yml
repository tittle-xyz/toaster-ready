version: 2
updates:
  # This repo's own rubric scores dependency patching, and it was scoring itself a
  # zero for it. Monthly: a CLI with a handful of Go deps doesn't need weekly churn.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
