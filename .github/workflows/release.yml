name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr: ${{ steps.release.outputs.pr }}
    steps:
      # Maintains a release PR from Conventional Commits; on merge, tags +
      # creates the GitHub Release + CHANGELOG.
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: go

      # Everything below runs only when a release was just created.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v7
        if: ${{ steps.release.outputs.release_created }}
        with:
          go-version: stable

      # Build cross-platform binaries + checksums and attach them to the release.
      - uses: goreleaser/goreleaser-action@v7
        if: ${{ steps.release.outputs.release_created }}
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Move the major-version tag (e.g. v1) so `uses: tittle-xyz/toaster-ready@v1`
      # always resolves to the latest release in that major series.
      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          major="v${{ steps.release.outputs.major }}"
          git tag -f "$major"
          git push -f origin "$major"

  # Keep our own badge honest, using our own action. If the badge in this README
  # can't be produced by the documented recipe, the recipe is wrong.
  #
  # It refreshes on the release PR because main is protected here and the Actions
  # bot cannot push to it — and because a badge that tracks releases is the one
  # people actually want.
  badge:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}

      # The action from this branch, not a released one: dogfooding it here is how
      # we find out it's broken before anyone else does.
      - uses: ./
        with:
          # The repo, not the branch we're standing on — a release branch carries
          # commits main doesn't, which moves the git-based signals.
          target: ${{ github.repository }}
          badge: docs/badge.svg
          commit: true
          # No gate: a release PR is not the place to discover the score slipped,
          # and ci.yml already gates every push.
          min: '0'
