name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains a release PR from Conventional Commits; on merge, tags +
      # creates the GitHub Release + CHANGELOG.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

      # Everything below runs only when a release was just created.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          go-version: stable

      # Build cross-platform binaries + checksums and attach them to the release.
      - uses: goreleaser/goreleaser-action@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Move the major-version tag (e.g. v1) so `uses: tittle-xyz/toaster-ready@v1`
      # always resolves to the latest release in that major series.
      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          major="v${{ steps.release.outputs.major }}"
          git tag -f "$major"
          git push -f origin "$major"
